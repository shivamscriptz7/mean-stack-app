<div class="page-wrapper">

  <!-- Background glow effect -->
  <div class="glow-blob"></div>

  <!-- Toast notification (success or error) -->
  <div *ngIf="toast.show" class="toast"
    [class.toast-success]="toast.type === 'success'"
    [class.toast-error]="toast.type === 'error'">
    <span>{{ toast.type === 'success' ? '✓' : '✕' }}</span>
    <span>{{ toast.message }}</span>
  </div>

  <!-- Main card wrapper -->
  <div class="card-wrapper">

    <p class="secure-label">— Secure Access —</p>

    <div class="card">

      <h2 class="card-title">Welcome back</h2>
      <p class="card-subtitle">Sign in to continue to your account</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <!-- Username field -->
        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="input-wrapper">

            <!-- User icon -->
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none"
              viewBox="0 0 24 24" stroke="rgba(255,255,255,0.25)">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>

            <input
              type="text"
              formControlName="username"
              placeholder="your_username"
              class="form-input"
              [class.input-error]="username?.invalid && username?.touched"
              (focus)="onFocus($event)"
              (blur)="onBlur($event)">
          </div>

          <!-- Username validation errors -->
          <div *ngIf="username?.invalid && username?.touched" class="error-messages">
            <p *ngIf="username?.errors?.['required']"  class="error-text">Username is required</p>
            <p *ngIf="username?.errors?.['minlength']" class="error-text">Minimum 3 characters required</p>
          </div>
        </div>

        <!-- Password field -->
        <div class="form-group form-group-password">
          <label class="form-label">Password</label>
          <div class="input-wrapper">

            <!-- Lock icon -->
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none"
              viewBox="0 0 24 24" stroke="rgba(255,255,255,0.25)">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>

            <!-- Password input: type switches based on showPassword toggle -->
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              class="form-input form-input-password"
              [class.input-error]="password?.invalid && password?.touched"
              (focus)="onFocus($event)"
              (blur)="onBlur($event)">

            <!-- Eye icon toggle button -->
            <button type="button" class="eye-btn" (click)="togglePassword()">

              <!-- Eye open: shown when password is hidden -->
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24" stroke="rgba(255,255,255,0.35)" width="16" height="16">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                     -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>

              <!-- Eye closed: shown when password is visible -->
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24" stroke="rgba(255,255,255,0.35)" width="16" height="16">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7
                     a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243
                     M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29
                     m7.532 7.532l3.29 3.29M3 3l3.59 3.59
                     m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7
                     a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>

            </button>
          </div>

          <!-- Password validation errors -->
          <div *ngIf="password?.invalid && password?.touched" class="error-messages">
            <p *ngIf="password?.errors?.['required']"  class="error-text">Password is required</p>
            <p *ngIf="password?.errors?.['minlength']" class="error-text">Minimum 6 characters required</p>
          </div>
        </div>

        <!-- Submit button -->
        <button
          type="submit"
          class="submit-btn"
          [disabled]="loading"
          [class.btn-loading]="loading">
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>

      </form>
    </div>

    <!-- Link to register page -->
    <p class="register-link">
      Don't have an account?
      <a routerLink="/register" class="register-anchor">Register</a>
    </p>

  </div>
</div>
