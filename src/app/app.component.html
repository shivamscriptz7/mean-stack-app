<div class="app-wrapper">

  <!-- Navbar -->
  <nav class="navbar">

    <!-- Brand -->
    <span class="nav-brand">⬡ MEAN App</span>

    <!-- Nav Links -->
    <div class="nav-links">

      <!-- Logged IN: Dashboard + Products + Logout -->
      <ng-container *ngIf="isLoggedIn()">
        <a routerLink="/dashboard"
           routerLinkActive="active-link"
           [routerLinkActiveOptions]="{ exact: true }"
           class="nav-link">
          Dashboard
        </a>

        <a routerLink="/products"
           routerLinkActive="active-link"
           [routerLinkActiveOptions]="{ exact: true }"
           class="nav-link">
          Products
        </a>

        <button class="nav-link nav-link-logout" (click)="logout()">
          Logout
        </button>
      </ng-container>

      <!-- Logged OUT: Register only -->
      <ng-container *ngIf="!isLoggedIn()">
        <a routerLink="/register"
           routerLinkActive="active-link-register"
           [routerLinkActiveOptions]="{ exact: true }"
           class="nav-link nav-link-register">
          Register
        </a>
      </ng-container>

    </div>
  </nav>

  <!-- Page Content -->
  <main>
    <router-outlet></router-outlet>
  </main>

</div>
