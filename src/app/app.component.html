<div style="
  min-height: 100vh;
  background-color: #0a0a0f;
  font-family: 'Courier New', monospace;
  color: #ffffff;
">

  <!-- Navbar -->
  <nav style="
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: 60px;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  ">

    <!-- Brand -->
    <span style="
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #818cf8;
      text-transform: uppercase;
    ">⬡ MEAN App</span>

    <!-- Nav links -->
    <div style="display: flex; gap: 8px; align-items: center;">

      <a routerLink="/dashboard" routerLinkActive="active-link" style="
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.45);
        text-decoration: none;
        padding: 6px 14px;
        border-radius: 6px;
        border: 1px solid transparent;
        transition: all 0.2s;
      "
      onmouseover="this.style.color='#ffffff'; this.style.borderColor='rgba(255,255,255,0.12)'; this.style.background='rgba(255,255,255,0.05)'"
      onmouseout="this.style.color='rgba(255,255,255,0.45)'; this.style.borderColor='transparent'; this.style.background='transparent'"
      >Dashboard</a>

      <a routerLink="/products" routerLinkActive="active-link" style="
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.45);
        text-decoration: none;
        padding: 6px 14px;
        border-radius: 6px;
        border: 1px solid transparent;
      "
      onmouseover="this.style.color='#ffffff'; this.style.borderColor='rgba(255,255,255,0.12)'; this.style.background='rgba(255,255,255,0.05)'"
      onmouseout="this.style.color='rgba(255,255,255,0.45)'; this.style.borderColor='transparent'; this.style.background='transparent'"
      >Products</a>

      <a routerLink="/register" routerLinkActive="active-link" style="
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #ffffff;
        text-decoration: none;
        padding: 6px 14px;
        border-radius: 6px;
        background-color: #4f46e5;
        border: 1px solid #4f46e5;
      "
      onmouseover="this.style.backgroundColor='#6366f1'; this.style.borderColor='#6366f1'"
      onmouseout="this.style.backgroundColor='#4f46e5'; this.style.borderColor='#4f46e5'"
      >Register</a>

    </div>
  </nav>

  <!-- Page Content -->
  <main>
    <router-outlet></router-outlet>
  </main>

</div>
