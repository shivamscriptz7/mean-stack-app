<div style="
  min-height: 100vh;
  background-color: #0a0a0f;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  font-family: 'Courier New', monospace;
  position: relative;
  overflow: hidden;
">

  <!-- Glow blob -->
  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, #6366f1, #0a0a0f);
    opacity: 0.1; filter: blur(120px); pointer-events: none;"></div>

  <!-- Toast Notification -->
  <div *ngIf="toast.show" style="
    position: fixed; top: 24px; right: 24px; z-index: 9999;
    padding: 14px 20px; border-radius: 10px;
    font-size: 12px; letter-spacing: 0.05em;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: fadeIn 0.3s ease;
  "
  [style.background]="toast.type === 'success' ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.15)'"
  [style.border]="toast.type === 'success' ? '1px solid rgba(16,185,129,0.4)' : '1px solid rgba(239,68,68,0.4)'"
  [style.color]="toast.type === 'success' ? '#6ee7b7' : '#fca5a5'"
  >
    <span>{{ toast.type === 'success' ? '✓' : '✕' }}</span>
    <span>{{ toast.message }}</span>
  </div>

  <!-- Card -->
  <div style="position: relative; z-index: 10; width: 100%; max-width: 380px;">

    <p style="font-size: 10px; letter-spacing: 0.3em; color: #818cf8;
      text-transform: uppercase; margin-bottom: 24px; text-align: center;">
      — Secure Access —
    </p>

    <div style="border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px); border-radius: 16px; padding: 32px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);">

      <h2 style="color: #ffffff; font-size: 22px; font-weight: 700; margin: 0 0 4px 0;">Welcome back</h2>
      <p style="color: rgba(255,255,255,0.3); font-size: 12px; margin: 0 0 28px 0;">Sign in to continue to your account</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <!-- Username -->
        <div style="margin-bottom: 18px;">
          <label style="display: block; font-size: 10px; letter-spacing: 0.2em;
            color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 8px;">
            Username
          </label>
          <div style="position: relative;">
            <svg style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px;"
              xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.25)">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <input type="text" formControlName="username" placeholder="your_username"
              [style.borderColor]="username?.invalid && username?.touched ? '#ef4444' : 'rgba(255,255,255,0.1)'"
              style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid;
                color: #ffffff; font-size: 13px; font-family: 'Courier New', monospace;
                border-radius: 8px; padding: 12px 16px 12px 38px; outline: none; box-sizing: border-box;"
              onfocus="this.style.background='rgba(255,255,255,0.08)'"
              onblur="this.style.background='rgba(255,255,255,0.05)'">
          </div>
          <!-- Validation errors -->
          <div *ngIf="username?.invalid && username?.touched" style="margin-top: 6px;">
            <p *ngIf="username?.errors?.['required']"
              style="color: #f87171; font-size: 10px; margin: 0; letter-spacing: 0.05em;">
              ✕ Username is required
            </p>
            <p *ngIf="username?.errors?.['minlength']"
              style="color: #f87171; font-size: 10px; margin: 0; letter-spacing: 0.05em;">
              ✕ Minimum 3 characters required
            </p>
          </div>
        </div>

        <!-- Password -->
        <div style="margin-bottom: 24px;">
          <label style="display: block; font-size: 10px; letter-spacing: 0.2em;
            color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 8px;">
            Password
          </label>
          <div style="position: relative;">
            <svg style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px;"
              xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.25)">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <input type="password" formControlName="password" placeholder="••••••••"
              [style.borderColor]="password?.invalid && password?.touched ? '#ef4444' : 'rgba(255,255,255,0.1)'"
              style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid;
                color: #ffffff; font-size: 13px; font-family: 'Courier New', monospace;
                border-radius: 8px; padding: 12px 16px 12px 38px; outline: none; box-sizing: border-box;"
              onfocus="this.style.background='rgba(255,255,255,0.08)'"
              onblur="this.style.background='rgba(255,255,255,0.05)'">
          </div>
          <div *ngIf="password?.invalid && password?.touched" style="margin-top: 6px;">
            <p *ngIf="password?.errors?.['required']"
              style="color: #f87171; font-size: 10px; margin: 0; letter-spacing: 0.05em;">
              ✕ Password is required
            </p>
            <p *ngIf="password?.errors?.['minlength']"
              style="color: #f87171; font-size: 10px; margin: 0; letter-spacing: 0.05em;">
              ✕ Minimum 6 characters required
            </p>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit"
          [disabled]="loading"
          [style.opacity]="loading ? '0.7' : '1'"
          style="width: 100%; padding: 13px; border-radius: 8px; border: none;
            background-color: #4f46e5; color: #ffffff; font-size: 13px; font-weight: 700;
            letter-spacing: 0.05em; cursor: pointer; box-shadow: 0 8px 24px rgba(79,70,229,0.35);
            font-family: 'Courier New', monospace;"
          onmouseover="if(!this.disabled) this.style.backgroundColor='#6366f1'"
          onmouseout="if(!this.disabled) this.style.backgroundColor='#4f46e5'">
          {{ loading ? 'Signing in...' : 'Sign In →' }}
        </button>

      </form>
    </div>

    <p style="text-align: center; color: rgba(255,255,255,0.2); font-size: 11px; margin-top: 20px;">
      Don't have an account?
      <a routerLink="/register" style="color: #818cf8; text-decoration: none;"
        onmouseover="this.style.textDecoration='underline'"
        onmouseout="this.style.textDecoration='none'">Register ::</a>
    </p>

  </div>
</div>
